<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การ์ดวันเกิด 🎂</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-100 flex items-center justify-center min-h-screen">

  <div class="bg-white rounded-2xl shadow-xl p-6 w-[350px] text-center">
    <h1 class="text-2xl font-bold text-pink-500 mb-4">🎉 Happy Birthday 🎉</h1>

    <!-- FORM -->
    <div id="formSection">
      <input id="nameInput" type="text" placeholder="Pokko" class="w-full p-2 mb-3 border rounded-lg">
      <textarea id="messageInput" placeholder="Happy birthday 19th ย้อนหลังจ้าา ขอให้แป้งมีความสุขมากๆ สมปรารถนาทุกอย่าง ใช้ชีวิตมหาลัยมีความสุข รวยๆเฮงๆ รวยแล้วอย่าลืมมาเลี้ยงหมูกระทะเรานะ อิอิ ชวนฟีฟายว่างๆได้นะ pokko" class="w-full p-2 mb-3 border rounded-lg"></textarea>

      <button onclick="generateLink()" class="bg-pink-500 text-white px-4 py-2 rounded-xl hover:bg-pink-600">
        สร้างลิงก์
      </button>
    </div>

    <!-- LINK -->
    <div id="linkSection" class="hidden mt-4">
      <p class="text-sm mb-2">ลิงก์ของคุณ:</p>
      <input id="shareLink" class="w-full p-2 border rounded-lg text-sm" readonly>
      <button onclick="copyLink()" class="mt-2 bg-green-500 text-white px-3 py-1 rounded-lg">
        คัดลอกลิงก์
      </button>
    </div>

    <!-- CARD -->
    <div id="card" class="mt-6 hidden">
      <h2 id="cardName" class="text-xl font-semibold text-pink-600"></h2>
      <p id="cardMessage" class="mt-2 whitespace-pre-line"></p>
      <div class="mt-4 text-5xl">🎂</div>
    </div>
  </div>

  <script>
    function generateLink() {
      const name = document.getElementById('nameInput').value;
      const message = document.getElementById('messageInput').value;

      const url = `${window.location.origin}${window.location.pathname}?name=${encodeURIComponent(name)}&message=${encodeURIComponent(message)}`;

      document.getElementById('shareLink').value = url;
      document.getElementById('linkSection').classList.remove('hidden');
    }

    function copyLink() {
      const input = document.getElementById('shareLink');
      input.select();
      input.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("คัดลอกลิงก์แล้ว!");
    }

    function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name");
      const message = params.get("message");

      if (name || message) {
        document.getElementById("formSection").style.display = "none";

        document.getElementById("cardName").innerText = "ถึง " + (name || "");
        document.getElementById("cardMessage").innerText = message || "";

        document.getElementById("card").classList.remove("hidden");
      }
    }

    loadFromURL();
  </script>

</body>
</html>
